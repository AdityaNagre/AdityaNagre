<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" height="100%">
  <defs>
    <linearGradient id="nightBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#181209" />
      <stop offset="55%" stop-color="#100C07" />
      <stop offset="100%" stop-color="#0A0704" />
    </linearGradient>

    <radialGradient id="torchGlow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.18" />
      <stop offset="55%" stop-color="#7B1E3A" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3E3B3" />
      <stop offset="45%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>

    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#8C6A3F" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="marbleCol" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A3226" />
      <stop offset="50%" stop-color="#544A38" />
      <stop offset="100%" stop-color="#241F17" />
    </linearGradient>
  </defs>

  <style>
    .title    { font-family: "Cinzel", "Trajan Pro", Georgia, "Times New Roman", serif; font-weight: 700; font-size: 46px; fill: url(#goldText); letter-spacing: 1px; }
    .subtitle { font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif; font-weight: 500; font-style: italic; font-size: 17px; fill: #C9B896; letter-spacing: 1px; }
    .badge    { font-family: "Cinzel", Georgia, serif; font-weight: 600; font-size: 11px; fill: #D4AF37; letter-spacing: 3px; }
    .rule     { stroke: url(#goldFrame); stroke-width: 1; }
  </style>

  <!-- Outer stone frame -->
  <rect x="1" y="1" width="898" height="258" rx="6" fill="url(#nightBg)" stroke="url(#goldFrame)" stroke-width="2" />
  <rect x="9" y="9" width="882" height="242" rx="3" fill="none" stroke="#8C6A3F" stroke-width="1" opacity="0.5" />

  <!-- Ambient torch glow, breathing -->
  <rect x="1" y="1" width="898" height="258" rx="6" fill="url(#torchGlow)" pointer-events="none">
    <animate attributeName="opacity" values="0.65;1;0.65" dur="5s" repeatCount="indefinite" />
  </rect>

  <!-- Golden light sweep across the marble -->
  <rect x="-260" y="1" width="140" height="258" fill="#F3E3B3" opacity="0.035">
    <animate attributeName="x" values="-260;1020" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- LEFT COLUMN -->
  <g transform="translate(46, 26)">
    <rect x="0" y="0" width="46" height="14" rx="1" fill="url(#marbleCol)" stroke="#8C6A3F" stroke-width="1" />
    <circle cx="6"  cy="7" r="6" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.8" />
    <circle cx="40" cy="7" r="6" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.8" />
    <rect x="6" y="14" width="34" height="178" fill="url(#marbleCol)" />
    <line x1="12" y1="14" x2="12" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="18" y1="14" x2="18" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="23" y1="14" x2="23" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="28" y1="14" x2="28" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="34" y1="14" x2="34" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <rect x="-4" y="192" width="54" height="12" rx="1" fill="url(#marbleCol)" stroke="#8C6A3F" stroke-width="1" />

    <!-- Flickering torch flame atop the column -->
    <g transform="translate(23, -22)">
      <path d="M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z" fill="#E8A33D">
        <animate attributeName="d" dur="0.9s" repeatCount="indefinite"
          values="M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z;
                  M0,-17 C 5,-9 7,-1 0,5 C -7,-1 -5,-9 0,-17 Z;
                  M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z" />
        <animate attributeName="fill" values="#E8A33D;#F3C25A;#E8A33D" dur="0.9s" repeatCount="indefinite" />
      </path>
    </g>
  </g>

  <!-- RIGHT COLUMN (mirrored) -->
  <g transform="translate(854, 26) scale(-1,1)">
    <rect x="0" y="0" width="46" height="14" rx="1" fill="url(#marbleCol)" stroke="#8C6A3F" stroke-width="1" />
    <circle cx="6"  cy="7" r="6" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.8" />
    <circle cx="40" cy="7" r="6" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.8" />
    <rect x="6" y="14" width="34" height="178" fill="url(#marbleCol)" />
    <line x1="12" y1="14" x2="12" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="18" y1="14" x2="18" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="23" y1="14" x2="23" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="28" y1="14" x2="28" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <line x1="34" y1="14" x2="34" y2="192" stroke="#1A150E" stroke-width="1.5" opacity="0.6" />
    <rect x="-4" y="192" width="54" height="12" rx="1" fill="url(#marbleCol)" stroke="#8C6A3F" stroke-width="1" />

    <g transform="translate(23, -22)">
      <path d="M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z" fill="#E8A33D">
        <animate attributeName="d" dur="1.1s" repeatCount="indefinite"
          values="M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z;
                  M0,-17 C 5,-9 7,-1 0,5 C -7,-1 -5,-9 0,-17 Z;
                  M0,-14 C 6,-8 6,-2 0,4 C -6,-2 -6,-8 0,-14 Z" />
        <animate attributeName="fill" values="#E8A33D;#F3C25A;#E8A33D" dur="1.1s" repeatCount="indefinite" />
      </path>
    </g>
  </g>

  <!-- Laurel crest + badge -->
  <g transform="translate(450, 46)" text-anchor="middle">
    <path d="M-52,0 C -70,10 -70,28 -50,34 M-50,34 C -60,26 -58,12 -44,6" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.9" />
    <path d="M-46,4 C -58,12 -58,24 -46,30" fill="none" stroke="#D4AF37" stroke-width="1.4" opacity="0.7" />
    <path d="M52,0 C 70,10 70,28 50,34 M50,34 C 60,26 58,12 44,6" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.9" />
    <path d="M46,4 C 58,12 58,24 46,30" fill="none" stroke="#D4AF37" stroke-width="1.4" opacity="0.7" />
    <text y="6" class="badge">FULL · STACK · ARCHITECT</text>
  </g>

  <!-- Title -->
  <text x="450" y="128" text-anchor="middle" class="title">Aditya Nagre</text>
  <line x1="300" y1="146" x2="600" y2="146" class="rule" />

  <!-- Subtitle -->
  <text x="450" y="176" text-anchor="middle" class="subtitle">Building Digital Monuments That Endure</text>

  <!-- Small ornamental base rule -->
  <text x="450" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="11" letter-spacing="4" fill="#7A6B4C">✦ REACT · NODE.JS · MMXXVI ✦</text>
</svg>
