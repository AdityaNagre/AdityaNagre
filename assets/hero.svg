<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080A" />
      <stop offset="50%" stop-color="#0F0F12" />
      <stop offset="100%" stop-color="#050506" />
    </linearGradient>
    
    <!-- Neon Accent Glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4B56D2" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#82C3EC" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#A5A5B0" />
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: url(#textGrad);
      letter-spacing: -1px;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #8E8E93;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .badge {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #2997FF;
      letter-spacing: 0.5px;
    }
    .badge-bg {
      fill: rgba(41, 151, 255, 0.1);
      stroke: rgba(41, 151, 255, 0.2);
      stroke-width: 1px;
    }
  </style>

  <!-- Container Box -->
  <rect x="1" y="1" width="798" height="198" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />
  
  <!-- Glowing Overlay (slow ambient pulse, like a display waking up) -->
  <rect x="1" y="1" width="798" height="198" rx="16" fill="url(#glow)" pointer-events="none">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- Scanline sweep across the whole card -->
  <rect x="-200" y="1" width="120" height="198" fill="#FFFFFF" opacity="0.03">
    <animate attributeName="x" values="-200;900" dur="7s" repeatCount="indefinite" />
  </rect>

  <!-- Animated Apple Logo Silhouette (gentle breathing) -->
  <g transform="translate(680, 60) scale(1.6)" opacity="0.15">
    <path fill="#FFFFFF" d="M15.2,12.9c0-2.8,2.3-4.2,2.4-4.2c-1.3-1.9-3.3-2.2-4-2.2c-1.7-0.2-3.4,1-4.3,1c-0.9,0-2.3-1-3.7-1 c-1.9,0-3.6,1.1-4.6,2.8c-2,3.4-0.5,8.4,1.4,11.2c0.9,1.3,2,2.8,3.4,2.7c1.4-0.1,1.9-0.9,3.5-0.9c1.6,0,2.1,0.9,3.5,0.9 c1.4,0,2.4-1.3,3.3-2.7c1.1-1.6,1.5-3.1,1.6-3.2C17.7,17.4,15.2,16.5,15.2,12.9z"/>
    <path fill="#FFFFFF" d="M11.9,4.2c0.8-0.9,1.3-2.2,1.1-3.5c-1.1,0-2.5,0.7-3.3,1.7c-0.7,0.8-1.3,2.1-1.1,3.4 C9.8,5.9,11.1,5.1,11.9,4.2z"/>
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="4s" repeatCount="indefinite" />
  </g>

  <!-- Left Side Content Group -->
  <g transform="translate(50, 0)">
    <!-- Badge -->
    <rect x="0" y="45" width="94" height="22" rx="11" class="badge-bg" />
    <text x="47" y="59" text-anchor="middle" class="badge">DEVELOPER</text>
    <circle cx="14" cy="56" r="3" fill="#30D158">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite" />
    </circle>

    <!-- Title -->
    <text x="0" y="112" class="title">Hi, I'm Aditya Nagre</text>
    <!-- Blinking terminal cursor at end of title -->
    <rect x="392" y="86" width="14" height="30" fill="#2997FF">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite" />
    </rect>

    <!-- Subtitle -->
    <text x="0" y="152" class="subtitle">Crafting the Future of Web Apps</text>
  </g>
</svg>
