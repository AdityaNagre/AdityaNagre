<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161616" />
      <stop offset="100%" stop-color="#0B0B0C" />
    </linearGradient>
  </defs>

  <style>
    .t-font { font-family: "SF Mono", "Fira Code", Consolas, Menlo, monospace; font-size: 14px; }
    .prompt-user { fill: #30D158; font-weight: 600; }
    .prompt-path { fill: #2997FF; font-weight: 600; }
    .prompt-sym  { fill: #8E8E93; }
    .cmd         { fill: #FFFFFF; }
    .out         { fill: #AEAEB2; }
    .accent      { fill: #FF9F0A; }
    .line { opacity: 0; }
  </style>

  <!-- Window -->
  <rect x="0" y="0" width="800" height="340" rx="14" fill="url(#termBg)" stroke="#2C2C2E" stroke-width="1.5" />

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="34" rx="14" fill="#1C1C1E" />
  <rect x="0" y="20" width="800" height="14" fill="#1C1C1E" />
  <circle cx="20" cy="17" r="6" fill="#FF5F56" />
  <circle cx="40" cy="17" r="6" fill="#FFBD2E" />
  <circle cx="60" cy="17" r="6" fill="#27C93F" />
  <text x="400" y="21" text-anchor="middle" class="t-font" font-size="12" fill="#8E8E93">aditya@portfolio — zsh — 80x24</text>

  <g class="t-font" transform="translate(24, 66)">

    <!-- Line 1 -->
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.3s" fill="freeze" />
      <text class="prompt-user">aditya</text>
      <text x="52" class="prompt-sym">@</text>
      <text x="62" class="prompt-path">portfolio</text>
      <text x="140" class="prompt-sym">%</text>
      <text x="156" class="cmd">whoami</text>
    </g>
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="0.9s" dur="0.3s" fill="freeze" />
      <text y="26" class="out">Full-Stack Developer · Building clean, fast, delightful web apps</text>
    </g>

    <!-- Line 2 -->
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.3s" fill="freeze" />
      <text y="56" class="prompt-user">aditya</text>
      <text x="52" y="56" class="prompt-sym">@</text>
      <text x="62" y="56" class="prompt-path">portfolio</text>
      <text x="140" y="56" class="prompt-sym">%</text>
      <text x="156" y="56" class="cmd">cat skills.json</text>
    </g>
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="2.5s" dur="0.3s" fill="freeze" />
      <text y="82" class="out">{</text>
      <text y="102" class="out">&#160;&#160;"frontend": ["React", "Tailwind CSS", "JavaScript"],</text>
      <text y="122" class="out">&#160;&#160;"backend":  ["Node.js", "Firebase"],</text>
      <text y="142" class="out">&#160;&#160;"tools":    ["Git", "GitHub", "VS Code"]</text>
      <text y="162" class="out">}</text>
    </g>

    <!-- Line 3 -->
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="3.6s" dur="0.3s" fill="freeze" />
      <text y="192" class="prompt-user">aditya</text>
      <text x="52" y="192" class="prompt-sym">@</text>
      <text x="62" y="192" class="prompt-path">portfolio</text>
      <text x="140" y="192" class="prompt-sym">%</text>
      <text x="156" y="192" class="cmd">./deploy.sh --status</text>
    </g>
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="4.3s" dur="0.3s" fill="freeze" />
      <text y="218" class="accent">✔</text>
      <text x="16" y="218" class="out">All systems operational. Open for opportunities &amp; collabs.</text>
    </g>

    <!-- Prompt + blinking cursor, final -->
    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="5s" dur="0.3s" fill="freeze" />
      <text y="248" class="prompt-user">aditya</text>
      <text x="52" y="248" class="prompt-sym">@</text>
      <text x="62" y="248" class="prompt-path">portfolio</text>
      <text x="140" y="248" class="prompt-sym">%</text>
      <rect x="156" y="235" width="9" height="16" fill="#FFFFFF">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
