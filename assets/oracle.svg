<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EBDFC0" />
      <stop offset="100%" stop-color="#DCCB9E" />
    </linearGradient>
    <linearGradient id="scrollRod" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8C6A3F" />
      <stop offset="50%" stop-color="#5C4426" />
      <stop offset="100%" stop-color="#8C6A3F" />
    </linearGradient>
    <radialGradient id="candleGlow" cx="50%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .oracle-font { font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif; }
    .head    { font-family: "Cinzel", Georgia, serif; font-size: 15px; fill: #5C1A2E; letter-spacing: 2px; font-weight: 700; }
    .prophecy{ font-size: 20px; fill: #241A0D; font-style: italic; }
    .signoff { font-size: 17px; fill: #5C1A2E; font-weight: 600; }
    .line    { opacity: 0; }
  </style>

  <!-- outer frame -->
  <rect x="0" y="0" width="800" height="340" rx="10" fill="#12100C" />

  <!-- scroll rods, top and bottom -->
  <rect x="20" y="14" width="760" height="16" rx="8" fill="url(#scrollRod)" />
  <circle cx="20" cy="22" r="10" fill="#5C4426" />
  <circle cx="780" cy="22" r="10" fill="#5C4426" />

  <rect x="20" y="310" width="760" height="16" rx="8" fill="url(#scrollRod)" />
  <circle cx="20" cy="318" r="10" fill="#5C4426" />
  <circle cx="780" cy="318" r="10" fill="#5C4426" />

  <!-- parchment body -->
  <rect x="20" y="30" width="760" height="280" fill="url(#parchment)" />
  <rect x="20" y="30" width="760" height="280" fill="url(#candleGlow)" />
  <rect x="20" y="30" width="760" height="280" fill="none" stroke="#B8A16B" stroke-width="1" opacity="0.6" />

  <g class="oracle-font" transform="translate(60, 68)">

    <text text-anchor="middle" x="340" class="head">— CONSULTATION OF THE ORACLE —</text>

    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.4s" fill="freeze" />
      <text y="46" class="prophecy">"Seeker, thou hast found the archive of Aditya Nagre."</text>
    </g>

    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.4s" fill="freeze" />
      <text y="86" class="prophecy">"His craft is woven from threads of React and Node.js,</text>
      <text y="112" class="prophecy">tempered in Tailwind, and bound with clean code."</text>
    </g>

    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="2.8s" dur="0.4s" fill="freeze" />
      <text y="152" class="prophecy">"His counsel: build with clarity. Ship with courage."</text>
    </g>

    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="4s" dur="0.4s" fill="freeze" />
      <text y="192" class="signoff">✦ The Oracle proclaims: all omens favor this visit. ✦</text>
    </g>

    <g class="line">
      <animate attributeName="opacity" values="0;1" begin="5s" dur="0.4s" fill="freeze" />
      <text y="232" class="prophecy" font-size="15" fill="#6B5A38">— thus it is written, MMXXVI —</text>
      <!-- quill blink -->
      <g transform="translate(400, 220)">
        <path d="M0,10 L14,-4 L17,-1 L3,13 Z" fill="#5C1A2E">
          <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1.1s" repeatCount="indefinite" />
        </path>
      </g>
    </g>
  </g>
</svg>
