<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="100%" height="100%">
  <defs>
    <linearGradient id="stoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B2620" />
      <stop offset="100%" stop-color="#1B1712" />
    </linearGradient>
    <linearGradient id="stoneFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#8C6A3F" stop-opacity="0.35" />
    </linearGradient>
    <radialGradient id="lampGlow" cx="30%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .head    { font-family: "Cinzel", Georgia, serif; font-size: 15px; font-weight: 700; fill: #D4AF37; letter-spacing: 2px; }
    .sub     { font-family: "Cormorant Garamond", Georgia, serif; font-style: italic; font-size: 10px; fill: #8C7A55; }
    .label   { font-family: "Cinzel", Georgia, serif; font-size: 10px; fill: #9C8A63; letter-spacing: 1px; }
    .value   { font-family: "Cormorant Garamond", Georgia, serif; font-size: 13px; fill: #EDE4D3; font-weight: 600; }
  </style>

  <!-- Stele silhouette: rectangle with arched top -->
  <path d="M8,60 A 202,80 0 0 1 412,60 L412,304 A8,8 0 0 1 404,312 L16,312 A8,8 0 0 1 8,304 Z"
        fill="url(#stoneBg)" stroke="url(#stoneFrame)" stroke-width="2" />
  <path d="M8,60 A 202,80 0 0 1 412,60" fill="none" stroke="#8C6A3F" stroke-width="1" opacity="0.5" />

  <rect x="8" y="55" width="404" height="257" fill="url(#lampGlow)" pointer-events="none" />

  <!-- Header -->
  <text x="210" y="42" text-anchor="middle" class="head">CODEX ARCHITECTI</text>
  <text x="210" y="60" text-anchor="middle" class="sub">— the tablet of the maker —</text>
  <line x1="70" y1="74" x2="350" y2="74" stroke="#D4AF37" stroke-width="0.75" opacity="0.5" />

  <!-- Small urn / vessel emblem, left -->
  <g transform="translate(48, 100)" opacity="0.9">
    <path d="M10,0 L34,0 L34,8 L44,14 L44,58 Q44,72 22,72 Q0,72 0,58 L0,14 L10,8 Z"
          fill="none" stroke="#B8860B" stroke-width="1.5" />
    <line x1="4" y1="14" x2="40" y2="14" stroke="#B8860B" stroke-width="1.2" />
    <path d="M14,30 Q22,24 30,30" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.8" />
    <path d="M14,44 Q22,38 30,44" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.8" />
  </g>

  <!-- Spec list, right -->
  <g transform="translate(114, 100)">
    <text x="0" y="0"  class="label">DISCIPLINE</text>
    <text x="0" y="17" class="value">Full-Stack Development</text>

    <text x="0" y="45" class="label">MEMORIA</text>
    <text x="0" y="62" class="value">Infinite Curiosity</text>

    <text x="0" y="90" class="label">FUNDAMENTUM</text>
    <text x="0" y="107" class="value">React &amp; Node.js</text>

    <text x="0" y="135" class="label">ARS</text>
    <text x="0" y="152" class="value">Tailwind &amp; Modern CSS</text>

    <text x="0" y="180" class="label">SIGILLUM</text>
    <text x="0" y="197" class="value">ADITYA NAGRE · MMXXVI</text>
    <rect x="184" y="187" width="7" height="12" fill="#D4AF37">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.51;1" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Footer seal button -->
  <g transform="translate(155, 278)">
    <rect x="0" y="0" width="110" height="22" rx="3" fill="#241F17" stroke="#8C6A3F" stroke-width="1" />
    <text x="55" y="15" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-size="9" letter-spacing="1.5" fill="#D4AF37">VIEW FULL SCROLL</text>
  </g>
</svg>
