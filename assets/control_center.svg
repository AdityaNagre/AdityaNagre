<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" width="100%" height="100%">
  <defs>
    <!-- Background Glass Gradient -->
    <linearGradient id="controlBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <!-- Glowing Blue for Active States -->
    <linearGradient id="activeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#0066CC" />
    </linearGradient>

    <!-- Glowing Green for Success/Online States -->
    <linearGradient id="activeGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30D158" />
      <stop offset="100%" stop-color="#248A3D" />
    </linearGradient>
  </defs>

  <style>
    .widget-bg {
      fill: #2C2C2E;
      stroke: #3A3A3C;
      stroke-width: 1px;
    }
    .widget-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 11px;
      fill: #AEAEB2;
      font-weight: 600;
    }
    .widget-value {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      fill: #FFFFFF;
      font-weight: 700;
    }
    .widget-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 9px;
      fill: #8E8E93;
    }
    .control-label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 10px;
      fill: #FFFFFF;
      font-weight: 500;
    }
  </style>

  <!-- Container Box -->
  <rect x="0" y="0" width="360" height="300" rx="16" fill="url(#controlBg)" stroke="#2C2C2E" stroke-width="1.5" />

  <!-- Title Bar -->
  <text x="20" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#FFFFFF" font-weight="700">Control Center</text>
  <circle cx="340" cy="24" r="3" fill="#30D158" /> <!-- Green active indicator -->

  <!-- Top Left: Connectivity Widget (React, Node, Git, Firebase) -->
  <g transform="translate(20, 45)">
    <rect x="0" y="0" width="150" height="115" rx="12" class="widget-bg" />
    
    <!-- Wi-Fi (React) -->
    <g transform="translate(15, 15)">
      <circle cx="16" cy="16" r="16" fill="url(#activeBlue)" />
      <!-- Wi-Fi Icon Wave Lines -->
      <path d="M10,13 A8,8 0 0,1 22,13 M8,10 A12,12 0 0,1 24,10 M13,17 A3,3 0 0,1 19,17" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" />
      <text x="40" y="14" class="widget-value">React</text>
      <text x="40" y="24" class="widget-sub">Connected</text>
    </g>

    <!-- Bluetooth (Node) -->
    <g transform="translate(15, 65)">
      <circle cx="16" cy="16" r="16" fill="url(#activeBlue)" />
      <!-- Bluetooth Icon -->
      <path d="M11,10 L21,20 L16,25 L16,7 L21,12 L11,22" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linejoin="round" />
      <text x="40" y="14" class="widget-value">Node.js</text>
      <text x="40" y="24" class="widget-sub">On</text>
    </g>
  </g>

  <!-- Top Right: Focus Mode (Do Not Disturb - Coding) -->
  <g transform="translate(190, 45)">
    <rect x="0" y="0" width="150" height="50" rx="12" class="widget-bg" />
    <g transform="translate(12, 10)">
      <rect x="0" y="0" width="30" height="30" rx="15" fill="#5856D6" />
      <!-- Moon Icon -->
      <path d="M22,16 A6,6 0 1,1 14,8 A8,8 0 1,0 22,16 Z" fill="#FFFFFF" />
      <text x="40" y="14" class="widget-value">Focus Mode</text>
      <text x="40" y="24" class="widget-sub">Coding (DND)</text>
    </g>
  </g>

  <!-- Middle Right: AirDrop & VPN (Tailwind & Firebase) -->
  <g transform="translate(190, 110)">
    <rect x="0" y="0" width="150" height="50" rx="12" class="widget-bg" />
    <!-- AirDrop (Tailwind) -->
    <g transform="translate(12, 10)">
      <rect x="0" y="0" width="30" height="30" rx="15" fill="url(#activeGreen)" />
      <!-- Share Icon (Simplified AirDrop) -->
      <circle cx="15" cy="15" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
      <circle cx="15" cy="15" r="8" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="2,2" />
      <text x="40" y="14" class="widget-value">Tailwind</text>
      <text x="40" y="24" class="widget-sub">Active</text>
    </g>
  </g>

  <!-- Bottom: Sliders (Creativity & Performance) -->
  <g transform="translate(20, 175)">
    <rect x="0" y="0" width="320" height="105" rx="12" class="widget-bg" />
    
    <!-- Brightness Slider (Creativity) -->
    <g transform="translate(15, 15)">
      <!-- Sun Icon (Creativity) -->
      <circle cx="15" cy="15" r="5" fill="none" stroke="#AEAEB2" stroke-width="2" />
      <path d="M15,3 L15,6 M15,24 L15,27 M3,15 L6,15 M24,15 L27,15" stroke="#AEAEB2" stroke-width="2" stroke-linecap="round" />
      
      <text x="40" y="10" class="widget-sub">FRONTEND CREATIVITY</text>
      
      <!-- Slider Track -->
      <rect x="40" y="16" width="250" height="10" rx="5" fill="#1C1C1E" />
      <rect x="40" y="16" width="220" height="10" rx="5" fill="#FFFFFF" /> <!-- Value at 88% -->
    </g>

    <!-- Volume Slider (Performance) -->
    <g transform="translate(15, 55)">
      <!-- Speaker Icon (Performance) -->
      <path d="M8,11 L12,11 L16,7 L16,23 L12,19 L8,19 Z" fill="#AEAEB2" />
      <path d="M19,11 A5,5 0 0,1 19,19" stroke="#AEAEB2" stroke-width="1.5" fill="none" stroke-linecap="round" />
      
      <text x="40" y="10" class="widget-sub">BACKEND PERFORMANCE</text>
      
      <!-- Slider Track -->
      <rect x="40" y="16" width="250" height="10" rx="5" fill="#1C1C1E" />
      <rect x="40" y="16" width="235" height="10" rx="5" fill="#FFFFFF" /> <!-- Value at 94% -->
    </g>
  </g>
</svg>
